<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>CATCH ME IF YOU CAN</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
:root{--void:#0a0a12;--cyan:#00f0ff;--pink:#ff2a6d;--yellow:#f0e030;--green:#05ffa1;--purple:#b026ff}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:var(--void);font-family:'Share Tech Mono',monospace;color:#fff;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
body::after{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px)}
body::before{content:'';position:fixed;inset:0;z-index:9998;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");background-size:200px;opacity:0.5}
canvas{position:fixed;inset:0;width:100%;height:100%;z-index:0}
#ui{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
#ui>*{pointer-events:auto}
#hud{position:fixed;top:0;left:0;right:0;z-index:20;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(180deg,rgba(10,10,18,0.95) 60%,transparent);pointer-events:none}
.hud-left,.hud-right{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.25)}
.hud-left span{color:var(--cyan)}
.hud-right span{color:var(--pink)}
.hud-center{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:0.3em;color:var(--cyan);opacity:0.4}
#trophy{position:fixed;top:60px;right:16px;z-index:20;background:rgba(10,10,18,0.85);border:1px solid rgba(0,240,255,0.12);border-radius:8px;padding:14px 18px;min-width:180px;backdrop-filter:blur(10px);pointer-events:none;transition:all 0.4s ease}
#trophy.hidden{opacity:0;transform:translateX(20px)}
.trophy-label{font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--yellow);margin-bottom:8px}
.trophy-fish{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;margin-bottom:4px}
.trophy-weight{font-size:12px;color:rgba(255,255,255,0.5)}
.trophy-rarity{font-size:10px;letter-spacing:0.1em;margin-top:4px}
#title-screen{text-align:center}
#title-screen h1{font-family:'Orbitron',sans-serif;font-size:clamp(28px,7vw,56px);font-weight:900;letter-spacing:0.05em;line-height:1.15;margin-bottom:8px}
#title-screen h1 .line1{display:block;color:var(--cyan);text-shadow:0 0 30px rgba(0,240,255,0.4),0 0 60px rgba(0,240,255,0.15)}
#title-screen h1 .line2{display:block;color:var(--pink);font-size:0.55em;letter-spacing:0.15em;text-shadow:0 0 30px rgba(255,42,109,0.4)}
.tagline{font-size:clamp(11px,1.5vw,14px);color:rgba(255,255,255,0.2);letter-spacing:0.2em;text-transform:uppercase;margin-bottom:40px}
.cast-btn{font-family:'Orbitron',sans-serif;font-size:clamp(16px,3vw,22px);font-weight:700;letter-spacing:0.15em;color:var(--void);background:var(--cyan);border:none;padding:18px 56px;border-radius:4px;cursor:pointer;text-transform:uppercase;transition:all 0.2s;box-shadow:0 0 30px rgba(0,240,255,0.3),0 0 60px rgba(0,240,255,0.1)}
.cast-btn:hover{transform:translateY(-2px);box-shadow:0 0 40px rgba(0,240,255,0.5),0 0 80px rgba(0,240,255,0.2)}
.cast-btn:active{transform:translateY(1px)}
#bite-alert{position:fixed;inset:0;z-index:30;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(255,42,109,0.08);opacity:0;pointer-events:none;transition:opacity 0.1s}
#bite-alert.active{opacity:1;pointer-events:auto;animation:flashBorder 0.3s ease-out}
.bite-text{font-family:'Orbitron',sans-serif;font-size:clamp(36px,10vw,72px);font-weight:900;color:var(--pink);text-shadow:0 0 40px rgba(255,42,109,0.6);animation:pulseText 0.4s ease-in-out infinite alternate;cursor:pointer}
.bite-sub{font-size:14px;color:rgba(255,255,255,0.4);margin-top:12px;letter-spacing:0.15em;animation:blink 0.5s step-end infinite}
.bite-timer{width:200px;height:3px;background:rgba(255,255,255,0.1);border-radius:2px;margin-top:20px;overflow:hidden}
.bite-timer-fill{height:100%;background:var(--pink);border-radius:2px;transition:width 0.1s linear}
@keyframes flashBorder{0%{box-shadow:inset 0 0 100px rgba(255,42,109,0.3)}100%{box-shadow:none}}
@keyframes pulseText{0%{transform:scale(1)}100%{transform:scale(1.05)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
#reel-screen{position:fixed;inset:0;z-index:30;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,10,18,0.85);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity 0.2s}
#reel-screen.active{opacity:1;pointer-events:auto}
.reel-label{font-family:'Orbitron',sans-serif;font-size:clamp(14px,3vw,20px);font-weight:700;letter-spacing:0.15em;color:var(--yellow);margin-bottom:24px;text-shadow:0 0 20px rgba(240,224,48,0.3)}
.meter-wrap{width:min(400px,85vw);height:40px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:4px;position:relative;overflow:hidden;cursor:pointer}
.meter-zone{position:absolute;top:0;bottom:0}
.zone-rl{left:0;width:20%;background:rgba(255,42,109,0.15)}
.zone-yl{left:20%;width:15%;background:rgba(240,224,48,0.1)}
.zone-g{left:35%;width:30%;background:rgba(5,255,161,0.12);border-left:1px solid rgba(5,255,161,0.2);border-right:1px solid rgba(5,255,161,0.2)}
.zone-yr{left:65%;width:15%;background:rgba(240,224,48,0.1)}
.zone-rr{left:80%;width:20%;background:rgba(255,42,109,0.15)}
.meter-needle{position:absolute;top:2px;bottom:2px;width:4px;background:var(--cyan);border-radius:2px;box-shadow:0 0 12px var(--cyan),0 0 24px rgba(0,240,255,0.3);z-index:2}
.meter-labels{display:flex;justify-content:space-between;width:min(400px,85vw);margin-top:8px;font-size:10px;color:rgba(255,255,255,0.2);letter-spacing:0.1em;text-transform:uppercase}
.reel-hint{margin-top:20px;font-size:12px;color:rgba(255,255,255,0.25);letter-spacing:0.1em}
#result-screen{position:fixed;inset:0;z-index:30;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,10,18,0.92);backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:opacity 0.3s}
#result-screen.active{opacity:1;pointer-events:auto}
.result-card{text-align:center;animation:slideUp 0.6s cubic-bezier(0.16,1,0.3,1) both}
@keyframes slideUp{from{opacity:0;transform:translateY(30px) scale(0.95)}to{opacity:1;transform:translateY(0) scale(1)}}
.result-rarity{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.3em;text-transform:uppercase;margin-bottom:16px}
.result-ascii{font-family:'Share Tech Mono',monospace;font-size:clamp(10px,1.8vw,14px);line-height:1.3;white-space:pre;margin-bottom:20px;text-shadow:0 0 10px currentColor}
.result-name{font-family:'Orbitron',sans-serif;font-size:clamp(24px,5vw,40px);font-weight:900;margin-bottom:8px}
.result-weight{font-size:clamp(16px,3vw,24px);color:rgba(255,255,255,0.5);margin-bottom:6px}
.result-new-record{font-family:'Orbitron',sans-serif;font-size:14px;color:var(--yellow);letter-spacing:0.2em;margin-top:12px;animation:pulseText 0.5s ease-in-out infinite alternate;text-shadow:0 0 20px rgba(240,224,48,0.4)}
.result-miss{font-family:'Orbitron',sans-serif;font-size:clamp(28px,6vw,48px);font-weight:900;color:var(--pink);margin-bottom:12px;text-shadow:0 0 30px rgba(255,42,109,0.4)}
.result-miss-sub{font-size:14px;color:rgba(255,255,255,0.3);margin-bottom:8px}
.btn-again{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;letter-spacing:0.12em;color:var(--void);background:var(--green);border:none;padding:14px 40px;border-radius:4px;cursor:pointer;text-transform:uppercase;transition:all 0.2s;box-shadow:0 0 20px rgba(5,255,161,0.3);margin-top:32px}
.btn-again:hover{transform:translateY(-2px);box-shadow:0 0 30px rgba(5,255,161,0.5)}
#status{position:fixed;bottom:20%;left:0;right:0;text-align:center;z-index:15;font-family:'Orbitron',sans-serif;font-size:clamp(12px,2vw,16px);letter-spacing:0.2em;color:var(--cyan);opacity:0;transition:opacity 0.3s;text-shadow:0 0 15px rgba(0,240,255,0.3);pointer-events:none}
#status.visible{opacity:1}
#depth{position:fixed;left:16px;top:50%;transform:translateY(-50%);z-index:15;pointer-events:none}
.depth-bar{width:3px;height:120px;background:rgba(255,255,255,0.04);border-radius:2px;position:relative}
.depth-fill{position:absolute;bottom:0;width:100%;background:linear-gradient(0deg,var(--cyan),var(--purple));border-radius:2px;transition:height 0.5s ease}
.depth-label{font-size:9px;letter-spacing:0.15em;color:rgba(255,255,255,0.15);text-transform:uppercase;writing-mode:vertical-lr;transform:rotate(180deg);margin-top:8px}
@media(max-width:640px){
  #trophy{right:8px;top:50px;min-width:150px;padding:10px 14px}
  .trophy-fish{font-size:12px}
  .cast-btn{padding:16px 40px;font-size:16px}
  #depth{display:none}
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hud">
  <div class="hud-left">Sector <span>7G</span> · Neo-Pacific</div>
  <div class="hud-center">CATCH ME IF YOU CAN</div>
  <div class="hud-right">Casts: <span id="cast-count">0</span></div>
</div>

<div id="trophy" class="hidden">
  <div class="trophy-label">🏆 Biggest Catch</div>
  <div class="trophy-fish" id="trophy-name">—</div>
  <div class="trophy-weight" id="trophy-weight">—</div>
  <div class="trophy-rarity" id="trophy-rarity">—</div>
</div>

<div id="depth">
  <div class="depth-bar"><div class="depth-fill" id="depth-fill" style="height:0%"></div></div>
  <div class="depth-label">Depth</div>
</div>

<div id="ui">
  <div id="title-screen">
    <h1><span class="line1">CATCH ME</span><span class="line2">If You Can</span></h1>
    <div class="tagline">Cyberpunk Fishing · 2026</div>
    <button class="cast-btn" id="cast-btn" onclick="game.cast()">🎣 CAST</button>
  </div>
</div>

<div id="status"></div>

<div id="bite-alert" onclick="game.hookIt()">
  <div class="bite-text">HOOK IT!</div>
  <div class="bite-sub">TAP ANYWHERE — NOW!</div>
  <div class="bite-timer"><div class="bite-timer-fill" id="bite-timer-fill"></div></div>
</div>

<div id="reel-screen" onclick="game.lockMeter()">
  <div class="reel-label">⚡ REEL IT IN</div>
  <div class="meter-wrap" id="meter">
    <div class="meter-zone zone-rl"></div>
    <div class="meter-zone zone-yl"></div>
    <div class="meter-zone zone-g"></div>
    <div class="meter-zone zone-yr"></div>
    <div class="meter-zone zone-rr"></div>
    <div class="meter-needle" id="needle"></div>
  </div>
  <div class="meter-labels"><span>Miss</span><span>Good</span><span>Perfect</span><span>Good</span><span>Miss</span></div>
  <div class="reel-hint">TAP TO LOCK</div>
</div>

<div id="result-screen">
  <div class="result-card" id="result-card"></div>
</div>

<script>
/* ═══════════════════════════════════════
   AUDIO — tiny Web Audio synth
   ═══════════════════════════════════════ */
const audio={
  ctx:null,
  init(){if(this.ctx)return;this.ctx=new(window.AudioContext||window.webkitAudioContext)()},
  beep(freq,dur,type='square',vol=0.08){
    if(!this.ctx)return;
    const o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type=type;o.frequency.value=freq;g.gain.value=vol;
    g.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+dur);
    o.connect(g).connect(this.ctx.destination);o.start();o.stop(this.ctx.currentTime+dur);
  },
  cast(){this.beep(200,0.15,'sine',0.1);setTimeout(()=>this.beep(300,0.2,'sine',0.06),100)},
  splash(){this.beep(80,0.3,'sawtooth',0.04)},
  bite(){this.beep(800,0.1);this.beep(1000,0.1);setTimeout(()=>this.beep(800,0.1),120)},
  reel(){this.beep(400,0.08,'triangle',0.05)},
  ping(){this.beep(1200,0.15,'sine',0.03);setTimeout(()=>this.beep(900,0.2,'sine',0.02),100)},
  tug(){this.beep(150,0.08,'sawtooth',0.04)},
  caught(){[0,100,200,300].forEach((d,i)=>setTimeout(()=>this.beep(400+i*150,0.15,'sine',0.08),d))},
  miss(){this.beep(200,0.3,'sawtooth',0.06);setTimeout(()=>this.beep(120,0.4,'sawtooth',0.04),200)},
  record(){[0,80,160,240,320,400].forEach((d,i)=>setTimeout(()=>this.beep(500+i*100,0.12,'sine',0.1),d))}
};

/* ═══════════════════════════════════════
   FISH DATABASE
   ═══════════════════════════════════════ */
const FISH=[
  {name:'Neon Guppy',     wMin:0.5,wMax:3, rarity:'COMMON',   color:'#00f0ff',chance:35},
  {name:'Chrome Bass',     wMin:3,  wMax:8, rarity:'COMMON',   color:'#c0c8d8',chance:25},
  {name:'Plasma Koi',      wMin:5,  wMax:15,rarity:'UNCOMMON', color:'#ff2a6d',chance:18},
  {name:'Quantum Tuna',    wMin:12, wMax:28,rarity:'RARE',     color:'#f0e030',chance:12},
  {name:'Holo Marlin',     wMin:25, wMax:55,rarity:'EPIC',     color:'#05ffa1',chance:7},
  {name:'Void Leviathan',  wMin:50, wMax:99,rarity:'LEGENDARY',color:'#b026ff',chance:3},
];
const FISH_ART={
  'Neon Guppy':    "    ·411>\n   <'411>",
  'Chrome Bass':   "    ·4111}>\n  <=4111}>>\n    ·4111}>",
  'Plasma Koi':    "     /·411}\\\n  <=<41111}>>\n     \\·411}/",
  'Quantum Tuna':  "      /·41111}\\\n   <=<411111111>>\n   <=<411111111>>\n      \\·41111}/",
  'Holo Marlin':   "              /|\n      /·411111/ \n  <=<4111111111>>\n  <=<4111111111>>\n      \\·411111\\ \n              \\|",
  'Void Leviathan':"                  /|\\\n         /·4111111/ |\n    <=<41111111111111>>\n   <=<411111111111111>>>\n    <=<41111111111111>>\n         \\·4111111\\ |\n                  \\|/"
};
const RARITY_COLORS={'COMMON':'#c0c8d8','UNCOMMON':'#ff2a6d','RARE':'#f0e030','EPIC':'#05ffa1','LEGENDARY':'#b026ff'};
const WAIT_MSGS=['Scanning depths...','Movement detected below...','Something is circling...','Sonar ping...','Hold steady...','Shadow approaching...','Signal flickering...','Almost...'];

/* ═══════════════════════════════════════
   GAME ENGINE
   ═══════════════════════════════════════ */
const game={
  state:'TITLE',
  casts:0,
  bestFish:null,
  bestWeight:0,
  needlePos:0,needleDir:1,needleSpeed:2.5,meterAnim:null,
  biteTimeout:null,biteTimer:null,biteStart:0,
  lineY:0,targetLineY:0,hookX:0,
  // Waiting-state action
  bubbles:[],ripples:[],shadowFish:[],sonarRings:[],
  lineTug:0,
  wBubbleT:0,wRippleT:0,wShadowT:0,wStatusT:0,wStatusIdx:0,

  cast(){
    audio.init();audio.cast();
    this.state='CASTING';this.casts++;
    document.getElementById('cast-count').textContent=this.casts;
    document.getElementById('title-screen').style.display='none';
    this.showStatus('Casting line...');
    this.hookX=W*0.5+(Math.random()-0.5)*W*0.3;
    this.targetLineY=H*(0.55+Math.random()*0.25);
    this.lineY=H*0.25;
    this.bubbles=[];this.shadowFish=[];this.sonarRings=[];this.lineTug=0;
    document.getElementById('depth-fill').style.height='0%';

    setTimeout(()=>{
      audio.splash();
      this.ripples.push({x:this.hookX,y:H*0.45,r:0,alpha:0.6});
      this.state='WAITING';
      this.wBubbleT=0;this.wRippleT=0;this.wShadowT=0;this.wStatusT=0;this.wStatusIdx=0;
      this.showStatus('Scanning depths...');
      document.getElementById('depth-fill').style.height=Math.floor(30+Math.random()*60)+'%';
      this.biteTimeout=setTimeout(()=>this.triggerBite(),2500+Math.random()*4500);
    },800);
  },

  triggerBite(){
    audio.bite();this.state='BITE';this.hideStatus();
    document.getElementById('bite-alert').classList.add('active');
    this.biteStart=Date.now();
    document.getElementById('bite-timer-fill').style.width='100%';
    this.biteTimer=setInterval(()=>{
      const pct=Math.max(0,100-((Date.now()-this.biteStart)/2000)*100);
      document.getElementById('bite-timer-fill').style.width=pct+'%';
      if(pct<=0){clearInterval(this.biteTimer);this.missedBite();}
    },30);
  },

  hookIt(){
    if(this.state!=='BITE')return;
    clearInterval(this.biteTimer);audio.reel();
    document.getElementById('bite-alert').classList.remove('active');
    this.startReel();
  },

  missedBite(){
    this.state='MISSED';
    document.getElementById('bite-alert').classList.remove('active');
    audio.miss();this.showResult(null,0,true);
  },

  startReel(){
    this.state='REELING';this.needlePos=0;this.needleDir=1;
    this.needleSpeed=2+Math.random()*2;
    document.getElementById('reel-screen').classList.add('active');
    const needle=document.getElementById('needle');
    const mw=document.getElementById('meter').offsetWidth;
    const animate=()=>{
      if(this.state!=='REELING')return;
      this.needlePos+=this.needleDir*this.needleSpeed;
      if(this.needlePos>=100){this.needlePos=100;this.needleDir=-1;}
      if(this.needlePos<=0){this.needlePos=0;this.needleDir=1;}
      needle.style.left=(this.needlePos/100*(mw-4))+'px';
      this.meterAnim=requestAnimationFrame(animate);
    };
    this.meterAnim=requestAnimationFrame(animate);
  },

  lockMeter(){
    if(this.state!=='REELING')return;
    cancelAnimationFrame(this.meterAnim);this.state='LOCKED';
    document.getElementById('reel-screen').classList.remove('active');
    const pos=this.needlePos;
    let zone;
    if(pos>=35&&pos<=65) zone='perfect';
    else if((pos>=20&&pos<35)||(pos>65&&pos<=80)) zone='good';
    else zone='miss';
    if(zone==='miss'){audio.miss();this.showResult(null,0,false,true);}
    else{audio.caught();const f=this.rollFish(zone),w=this.rollWeight(f,zone);this.showResult(f,w);}
  },

  rollFish(zone){
    let pool=[];
    FISH.forEach(f=>{
      let c=f.chance;
      if(zone==='perfect'){
        if(f.rarity==='EPIC'||f.rarity==='LEGENDARY') c*=3;
        if(f.rarity==='RARE') c*=2;
      }
      for(let i=0;i<c;i++) pool.push(f);
    });
    return pool[Math.floor(Math.random()*pool.length)];
  },

  rollWeight(fish,zone){
    let w=fish.wMin+Math.random()*(fish.wMax-fish.wMin);
    if(zone==='perfect') w*=1.1+Math.random()*0.2;
    return Math.round(Math.min(w,fish.wMax*1.25)*10)/10;
  },

  showResult(fish,weight,timedOut=false,badReel=false){
    const card=document.getElementById('result-card');
    this.hideStatus();this.lineY=0;this.targetLineY=0;
    document.getElementById('depth-fill').style.height='0%';
    if(timedOut||badReel){
      card.innerHTML=`<div class="result-miss">GOT AWAY</div>
        <div class="result-miss-sub">${timedOut?'Too slow! The fish escaped.':'Bad reel — the line snapped!'}</div>
        <div style="font-size:40px;margin:16px 0;filter:grayscale(1) opacity(0.3)">🐟</div>
        <button class="btn-again" onclick="game.reset()">CAST AGAIN</button>`;
    } else {
      const isRecord=weight>this.bestWeight;
      if(isRecord){this.bestFish=fish;this.bestWeight=weight;this.updateTrophy();setTimeout(()=>audio.record(),400);}
      const art=(FISH_ART[fish.name]||'><(((°>').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      card.innerHTML=`<div class="result-rarity" style="color:${RARITY_COLORS[fish.rarity]}">${fish.rarity}</div>
        <div class="result-ascii" style="color:${fish.color}">${art}</div>
        <div class="result-name" style="color:${fish.color};text-shadow:0 0 30px ${fish.color}55">${fish.name}</div>
        <div class="result-weight">${weight} kg</div>
        ${isRecord?'<div class="result-new-record">★ NEW RECORD ★</div>':''}
        <button class="btn-again" onclick="game.reset()">CAST AGAIN</button>`;
    }
    document.getElementById('result-screen').classList.add('active');
  },

  updateTrophy(){
    document.getElementById('trophy').classList.remove('hidden');
    document.getElementById('trophy-name').textContent=this.bestFish.name;
    document.getElementById('trophy-name').style.color=this.bestFish.color;
    document.getElementById('trophy-weight').textContent=this.bestWeight+' kg';
    const r=document.getElementById('trophy-rarity');
    r.textContent=this.bestFish.rarity;r.style.color=RARITY_COLORS[this.bestFish.rarity];
  },

  reset(){
    this.state='TITLE';
    document.getElementById('result-screen').classList.remove('active');
    document.getElementById('bite-alert').classList.remove('active');
    document.getElementById('reel-screen').classList.remove('active');
    document.getElementById('title-screen').style.display='';
    this.hideStatus();this.lineY=0;this.targetLineY=0;
    this.bubbles=[];this.shadowFish=[];this.sonarRings=[];this.lineTug=0;
  },

  showStatus(t){const e=document.getElementById('status');e.textContent=t;e.classList.add('visible');},
  hideStatus(){document.getElementById('status').classList.remove('visible');},

  /* ── WAITING STATE ACTION ── */
  updateWaiting(dt){
    if(this.state!=='WAITING') return;
    const hx=this.hookX,hy=this.lineY,waterY=H*0.45;

    // Bubbles from hook
    this.wBubbleT+=dt;
    if(this.wBubbleT>0.12&&hy>waterY){
      this.wBubbleT=0;
      this.bubbles.push({x:hx+(Math.random()-0.5)*30,y:hy+(Math.random()-0.5)*10,
        r:1+Math.random()*3,speed:0.5+Math.random()*1.2,alpha:0.3+Math.random()*0.4,wobble:Math.random()*6.28});
    }
    this.bubbles=this.bubbles.filter(b=>{
      b.y-=b.speed;b.x+=Math.sin(b.wobble)*0.3;b.wobble+=0.08;b.alpha-=0.004;
      return b.alpha>0&&b.y>waterY-5;
    });

    // Sonar pings
    this.wRippleT+=dt;
    if(this.wRippleT>1.5+Math.random()&&hy>waterY){
      this.wRippleT=0;
      this.sonarRings.push({x:hx,y:hy,r:0,alpha:0.25});
      this.ripples.push({x:hx+(Math.random()-0.5)*20,y:waterY,r:0,alpha:0.5});
      audio.ping();
    }
    this.sonarRings=this.sonarRings.filter(s=>{s.r+=0.8;s.alpha*=0.975;return s.alpha>0.01;});

    // Shadow fish
    this.wShadowT+=dt;
    if(this.wShadowT>2+Math.random()*2&&this.shadowFish.length<3){
      this.wShadowT=0;
      const fromL=Math.random()>0.5,sy=hy+(Math.random()-0.5)*80;
      if(sy>waterY+20){
        this.shadowFish.push({x:fromL?-40:W+40,y:sy,targetX:hx+(Math.random()-0.5)*60,
          speed:0.6+Math.random()*0.8,dir:fromL?1:-1,size:8+Math.random()*14,
          color:['#00f0ff','#ff2a6d','#b026ff','#05ffa1','#f0e030'][Math.floor(Math.random()*5)],
          alpha:0.15+Math.random()*0.15,phase:0,lingerTime:0,wobble:Math.random()*6.28,drawY:sy});
      }
    }
    this.shadowFish=this.shadowFish.filter(f=>{
      f.wobble+=0.04;f.drawY=f.y+Math.sin(f.wobble)*5;
      if(f.phase===0){f.x+=f.speed*f.dir;if(Math.abs(f.x-f.targetX)<10){f.phase=1;f.lingerTime=0.8+Math.random()*1.5;}}
      else if(f.phase===1){f.x+=Math.sin(f.wobble*2)*0.5;f.y+=Math.cos(f.wobble*2)*0.3;f.lingerTime-=dt;if(f.lingerTime<=0){f.phase=2;f.dir=Math.random()>0.5?1:-1;f.speed=1.5+Math.random();}}
      else{f.x+=f.speed*f.dir*1.8;f.alpha-=0.005;}
      return f.alpha>0&&f.x>-60&&f.x<W+60;
    });

    // Line tugs
    if(Math.random()<0.012){this.lineTug=6+Math.random()*8;audio.tug();}
    if(this.lineTug>0.1)this.lineTug*=0.88;else this.lineTug=0;

    // Cycle status
    this.wStatusT+=dt;
    if(this.wStatusT>2.5){this.wStatusT=0;this.wStatusIdx++;this.showStatus(WAIT_MSGS[this.wStatusIdx%WAIT_MSGS.length]);}
  }
};

// Input
document.addEventListener('keydown',e=>{
  if(game.state==='BITE') game.hookIt();
  else if(game.state==='REELING') game.lockMeter();
});

/* ═══════════════════════════════════════
   CANVAS RENDERER
   ═══════════════════════════════════════ */
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H,t=0,lastTime=0;

// Scene data
let particles=[],buildings=[],bgFish=[];

function initParticles(){
  particles=[];
  for(let i=0;i<60;i++){
    particles.push({x:Math.random()*W,y:H*0.45+Math.random()*H*0.55,
      vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.1,
      r:1+Math.random()*2,alpha:0.1+Math.random()*0.3,
      color:['#00f0ff','#ff2a6d','#b026ff','#05ffa1'][Math.floor(Math.random()*4)]});
  }
}
function initBuildings(){
  buildings=[];const wy=H*0.45;
  [[.05,.32,.04],[.1,.28,.035],[.15,.35,.03],[.2,.22,.045],[.27,.3,.035],[.33,.26,.04],
   [.4,.34,.03],[.45,.2,.05],[.52,.31,.035],[.58,.25,.04],[.64,.33,.03],[.7,.24,.045],
   [.77,.3,.035],[.83,.27,.04],[.9,.35,.035],[.95,.29,.03]].forEach(([bx,bh,bw])=>{
    const x=bx*W,w=bw*W,y=wy-H*(0.45-bh),wins=[];
    for(let ry=y+4;ry<wy-4;ry+=6)for(let rx=x+3;rx<x+w-3;rx+=5)
      if(Math.random()>0.55) wins.push({x:rx,y:ry,c:['rgba(0,240,255,0.15)','rgba(255,42,109,0.1)','rgba(240,224,48,0.08)'][Math.floor(Math.random()*3)]});
    buildings.push({x,y,w,h:wy-y,wins});
  });
}
function initBgFish(){
  bgFish=[];
  for(let i=0;i<8;i++){
    bgFish.push({x:Math.random()*W,y:H*0.5+Math.random()*H*0.4,
      speed:0.3+Math.random()*0.6,dir:Math.random()>0.5?1:-1,
      size:4+Math.random()*8,
      color:['#00f0ff','#ff2a6d','#b026ff','#05ffa1','#f0e030'][Math.floor(Math.random()*5)],
      alpha:0.06+Math.random()*0.1,wobble:Math.random()*6.28});
  }
}

function resize(){
  const dpr=window.devicePixelRatio||1;
  W=window.innerWidth;H=window.innerHeight;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  initParticles();initBuildings();initBgFish();
}
window.addEventListener('resize',resize);
resize();

/* ── DRAW LOOP ── */
function draw(now){
  const dt=lastTime?(now-lastTime)/1000:0.016;
  lastTime=now;t+=dt;
  ctx.clearRect(0,0,W,H);
  game.updateWaiting(dt);

  const waterY=H*0.45;

  // Sky gradient
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#0a0a12');sky.addColorStop(0.4,'#0d0d1a');sky.addColorStop(0.45,'#0a1628');sky.addColorStop(1,'#060610');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);

  // City silhouette
  buildings.forEach(b=>{
    ctx.fillStyle='rgba(15,15,30,0.8)';ctx.fillRect(b.x,b.y,b.w,b.h);
    b.wins.forEach(w=>{ctx.fillStyle=w.c;ctx.fillRect(w.x,w.y,2,3);});
  });

  // Water surface
  ctx.beginPath();ctx.moveTo(0,waterY);
  for(let x=0;x<=W;x+=4){const wave=Math.sin(x*0.008+t*1.2)*3+Math.sin(x*0.015+t*0.8)*2;ctx.lineTo(x,waterY+wave);}
  ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();
  const wg=ctx.createLinearGradient(0,waterY,0,H);
  wg.addColorStop(0,'rgba(0,20,40,0.6)');wg.addColorStop(0.3,'rgba(5,10,30,0.8)');wg.addColorStop(1,'rgba(3,3,10,0.95)');
  ctx.fillStyle=wg;ctx.fill();

  // Water surface glow line
  ctx.beginPath();ctx.moveTo(0,waterY);
  for(let x=0;x<=W;x+=4){const wave=Math.sin(x*0.008+t*1.2)*3+Math.sin(x*0.015+t*0.8)*2;ctx.lineTo(x,waterY+wave);}
  ctx.strokeStyle='rgba(0,240,255,0.15)';ctx.lineWidth=2;ctx.stroke();

  // Neon reflections
  for(let i=0;i<5;i++){
    const rx=W*(0.1+i*0.2)+Math.sin(t*0.5+i)*20;
    ctx.beginPath();ctx.ellipse(rx,waterY+10+i*8,30+Math.sin(t+i*2)*15,1.5,0,0,Math.PI*2);
    ctx.fillStyle=`rgba(0,240,255,${0.04+Math.sin(t+i)*0.02})`;ctx.fill();
  }

  // Underwater particles
  particles.forEach(p=>{
    p.x+=p.vx+Math.sin(t*0.5+p.y*0.01)*0.2;p.y+=p.vy;
    if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<waterY+10)p.y=H-10;if(p.y>H)p.y=waterY+10;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.color;
    ctx.globalAlpha=p.alpha*(0.5+Math.sin(t*2+p.x)*0.5);ctx.fill();ctx.globalAlpha=1;
  });

  // Ambient background fish
  bgFish.forEach(f=>{
    f.x+=f.speed*f.dir;f.wobble+=0.03;
    const fy=f.y+Math.sin(f.wobble)*8;
    if(f.dir>0&&f.x>W+20)f.x=-20;if(f.dir<0&&f.x<-20)f.x=W+20;
    ctx.save();ctx.translate(f.x,fy);ctx.scale(f.dir,1);ctx.globalAlpha=f.alpha;ctx.fillStyle=f.color;
    ctx.beginPath();ctx.moveTo(f.size,0);ctx.lineTo(-f.size,-f.size*0.5);ctx.lineTo(-f.size*0.4,0);ctx.lineTo(-f.size,f.size*0.5);ctx.closePath();ctx.fill();
    ctx.globalAlpha=1;ctx.restore();
  });

  /* ── FISHING LINE + WAITING ACTION ── */
  if(game.state==='CASTING'||game.state==='WAITING'||game.state==='BITE'){
    game.lineY+=(game.targetLineY-game.lineY)*0.06;
    const rodX=W*0.5,rodY=H*0.12,hx=game.hookX;
    const tugX=game.lineTug*Math.sin(t*25);
    const tugY=game.lineTug*Math.cos(t*30)*0.5;
    const hy=game.lineY+tugY;

    // Line curve
    ctx.beginPath();ctx.moveTo(rodX,rodY);
    ctx.bezierCurveTo(
      rodX+(hx-rodX)*0.3+tugX*0.3, rodY+(hy-rodY)*0.2,
      hx-(hx-rodX)*0.1+tugX*0.6, hy-30+tugY,
      hx+tugX, hy);
    ctx.strokeStyle=game.state==='BITE'?'rgba(255,42,109,0.6)':game.lineTug>1?'rgba(240,224,48,0.5)':'rgba(0,240,255,0.3)';
    ctx.lineWidth=game.lineTug>1?2:1.5;ctx.stroke();

    // Hook glow
    ctx.beginPath();ctx.arc(hx+tugX,hy,game.state==='BITE'?6+Math.sin(t*10)*3:3,0,Math.PI*2);
    ctx.fillStyle=game.state==='BITE'?'rgba(255,42,109,0.8)':'rgba(0,240,255,0.5)';ctx.fill();

    // Bobber
    if(hy>waterY){
      const by=waterY+Math.sin(t*2)*2+(game.lineTug>1?-game.lineTug*0.8:0);
      ctx.beginPath();ctx.arc(hx,by,4+(game.lineTug>1?1:0),0,Math.PI*2);ctx.fillStyle='#ff2a6d';ctx.fill();
      ctx.beginPath();ctx.arc(hx,by,7,0,Math.PI*2);
      ctx.strokeStyle=game.lineTug>1?'rgba(240,224,48,0.4)':'rgba(255,42,109,0.3)';ctx.lineWidth=1;ctx.stroke();
      if(game.lineTug>2){ctx.beginPath();ctx.arc(hx,by,10+game.lineTug,0,Math.PI*2);ctx.strokeStyle=`rgba(0,240,255,${game.lineTug*0.03})`;ctx.stroke();}
    }

    // ── WAITING VISUALS ──
    if(game.state==='WAITING'){
      // Sonar rings (dashed)
      game.sonarRings.forEach(s=>{
        ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.strokeStyle=`rgba(0,240,255,${s.alpha})`;ctx.lineWidth=1;ctx.setLineDash([3,4]);ctx.stroke();ctx.setLineDash([]);
      });

      // Bubbles
      game.bubbles.forEach(b=>{
        ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
        ctx.strokeStyle=`rgba(0,240,255,${b.alpha*0.6})`;ctx.lineWidth=0.8;ctx.stroke();
        ctx.fillStyle=`rgba(0,240,255,${b.alpha*0.15})`;ctx.fill();
        ctx.beginPath();ctx.arc(b.x-b.r*0.3,b.y-b.r*0.3,b.r*0.3,0,Math.PI*2);
        ctx.fillStyle=`rgba(255,255,255,${b.alpha*0.4})`;ctx.fill();
      });

      // Shadow fish
      game.shadowFish.forEach(f=>{
        ctx.save();ctx.translate(f.x,f.drawY);ctx.scale(f.dir,1);ctx.globalAlpha=f.alpha;
        ctx.shadowColor=f.color;ctx.shadowBlur=12;ctx.fillStyle=f.color;
        ctx.beginPath();ctx.ellipse(0,0,f.size,f.size*0.35,0,0,Math.PI*2);ctx.fill();
        // Tail
        ctx.beginPath();const tf=Math.sin(t*6+f.wobble)*f.size*0.25;
        ctx.moveTo(-f.size,0);ctx.lineTo(-f.size*1.5,-f.size*0.35+tf);ctx.lineTo(-f.size*1.5,f.size*0.35+tf);ctx.closePath();ctx.fill();
        // Eye
        ctx.beginPath();ctx.arc(f.size*0.55,-f.size*0.05,f.size*0.08,0,Math.PI*2);
        ctx.fillStyle='#fff';ctx.globalAlpha=f.alpha*1.5;ctx.fill();
        ctx.shadowBlur=0;ctx.globalAlpha=1;ctx.restore();
      });
    }
  }

  // Surface ripples
  game.ripples=game.ripples.filter(r=>{
    r.r+=1.5;r.alpha*=0.96;
    ctx.beginPath();ctx.arc(r.x,r.y,r.r,0,Math.PI*2);
    ctx.strokeStyle=`rgba(0,240,255,${r.alpha})`;ctx.lineWidth=1;ctx.stroke();
    return r.alpha>0.01;
  });

  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);
</script>
